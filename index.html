<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Манай Рестораны Цэс</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #fff8f0;
      }
      h1 {
        color: #d35400;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        padding: 10px 0;
        border-bottom: 1px solid #ccc;
      }
      .price {
        float: right;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Манай Рестораны Цэс</h1>
    <ul>
      <li>Бургер <span class="price">$5</span></li>
      <li>Пицца <span class="price">$8</span></li>
      <li>Кофе <span class="price">$2</span></li>
      <li>Салат <span class="price">$4</span></li>
    </ul>
  </body>
</html>
